---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sure-db
spec:
  interval: 10m
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: sure-app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      main:
        type: statefulset
        containers:
          app:
            image:
              repository: postgres
              tag: "16"
            envFrom:
              - secretRef:
                  name: sure-secret
            env:
              PGDATA: /var/lib/postgresql/data/pgdata
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 30
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/sh
                      - -c
                      - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi

    service:
      main:
        controller: main
        ports:
          postgres:
            port: 5432

    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: local-path
        advancedMounts:
          main:
            app:
              - path: /var/lib/postgresql/data
